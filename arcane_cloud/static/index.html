<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>A.R.C.A.N.E.</title>
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{--red:#ff2020;--dark-red:#880808;--dim:#3a0808;--bg:#000;--panel:#050000;--border:#6a0404;--text:#ffdddd}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* HEADER */
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;flex-direction:column}
.hdr-title{color:var(--red);font-size:20px;font-weight:bold;letter-spacing:3px;text-shadow:0 0 12px #ff202066}
.hdr-sub{color:var(--dim);font-size:8px;letter-spacing:1px;margin-top:1px}
.status-badge{display:flex;align-items:center;gap:6px;background:#0a0000;border:1px solid var(--border);border-radius:20px;padding:5px 12px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.status-txt{font-size:10px;font-weight:bold;color:var(--red)}

/* TABS */
.tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:10px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;letter-spacing:.5px}
.tab.active{color:var(--red);border-color:var(--red)}

/* PANELS */
.panel{display:none;flex:1;overflow-y:auto;padding:10px}
.panel.active{display:flex;flex-direction:column;gap:8px}
.panel::-webkit-scrollbar{width:2px}
.panel::-webkit-scrollbar-thumb{background:var(--border)}

/* CHAT PANEL */
#tab-chat{padding:0;display:flex;flex-direction:column}

/* ORB */
.orb-section{display:flex;flex-direction:column;align-items:center;padding:10px 0 4px;flex-shrink:0}
canvas#orb{display:block}
.caption{color:#ff6060;font-size:10px;min-height:16px;text-align:center;padding:2px 16px;font-style:italic;transition:.3s}

/* QUICK BTNS */
.quick{display:flex;gap:6px;padding:4px 12px 6px;overflow-x:auto;flex-shrink:0}
.quick::-webkit-scrollbar{display:none}
.qbtn{background:#0d0000;border:1px solid var(--border);color:var(--text);border-radius:20px;padding:6px 14px;font-family:'Courier New',monospace;font-size:10px;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:.15s}
.qbtn:active{background:var(--dark-red);transform:scale(.96)}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:6px}
.msgs::-webkit-scrollbar{width:2px}
.msgs::-webkit-scrollbar-thumb{background:var(--border)}

.msg-wrap{display:flex;flex-direction:column}
.msg-label{font-size:8px;color:var(--dim);margin-bottom:2px;letter-spacing:.5px}
.msg-label.you{text-align:right}
.bubble{padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.55;word-break:break-word;border:1px solid #1a0000;max-width:92%}
.bubble.user{align-self:flex-end;background:#0f0000;border-color:#4a0404;color:#ffcccc}
.bubble.ai{align-self:flex-start;background:#080000;border-color:#2a0000;color:#ffdddd}
.bubble.sys{align-self:flex-start;background:#0a0400;border-color:#3a1500;color:#ff8840}
.bubble.action{align-self:flex-start;background:#080000;border-color:#2a0000;color:#ff8c00}
.bubble img{max-width:100%;border-radius:8px;margin-top:6px;display:block}

.typing{align-self:flex-start;color:#660000;font-size:11px;padding:4px 0;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* INPUT BAR */
.bar{background:var(--panel);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.inp{flex:1;background:#080000;border:1px solid var(--border);color:var(--text);border-radius:24px;padding:11px 18px;font-family:'Courier New',monospace;font-size:13px;outline:none;-webkit-appearance:none}
.inp::placeholder{color:#2a0808}
.inp:focus{border-color:#880808}
.send-btn{background:var(--dark-red);border:none;color:#fff;border-radius:50%;width:46px;height:46px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.send-btn:active{background:var(--red);transform:scale(.94)}
.mic-btn{background:#080000;border:1px solid var(--border);color:var(--text);border-radius:50%;width:46px;height:46px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.mic-btn.active{background:#4a0000;border-color:var(--red);animation:mic-pulse .6s infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 #ff202044}50%{box-shadow:0 0 0 6px transparent}}

/* INFO CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
.card-title{color:var(--red);font-size:10px;font-weight:bold;letter-spacing:1px;margin-bottom:8px}
.card-body{color:var(--text);font-size:11px;line-height:1.6;white-space:pre-wrap}
.card-btns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.card-btn{background:var(--dark-red);border:none;color:#fff;border-radius:6px;padding:7px 14px;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;transition:.15s}
.card-btn:active{background:var(--red)}
.mem-inp{width:100%;background:#080000;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 14px;font-family:'Courier New',monospace;font-size:12px;outline:none;margin-bottom:8px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">◈ ARCANE</div>
    <div class="hdr-sub">ADAPTIVE RUNTIME COMPUTING & AUTONOMOUS NEURAL ENGINE</div>
  </div>
  <div class="status-badge">
    <div class="status-dot" id="sdot"></div>
    <div class="status-txt" id="stxt">ONLINE</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('chat')">💬 CHAT</div>
  <div class="tab" onclick="showTab('school')">📚 SCHOOL</div>
  <div class="tab" onclick="showTab('weather')">🌤 WEATHER</div>
  <div class="tab" onclick="showTab('memory')">🧠 MEMORY</div>
</div>

<!-- CHAT -->
<div class="panel active" id="tab-chat">
  <div class="orb-section">
    <canvas id="orb" width="150" height="150"></canvas>
    <div class="caption" id="caption"></div>
  </div>
  <div class="quick">
    <div class="qbtn" onclick="send('What time is it?')">🕐 Time</div>
    <div class="qbtn" onclick="send('What classes do I have today?')">📚 Classes</div>
    <div class="qbtn" onclick="send('What is the weather in Leeuwarden?')">🌤 Weather</div>
    <div class="qbtn" onclick="send('Open Spotify and play lofi')">🎵 Lofi</div>
    <div class="qbtn" onclick="send('Focus mode')">🎯 Focus</div>
    <div class="qbtn" onclick="send('Show PC stats')">💻 Stats</div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="bar">
    <input class="inp" id="inp" type="text" placeholder="Ask Arcane..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙</button>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<!-- SCHOOL -->
<div class="panel" id="tab-school">
  <div class="card">
    <div class="card-title">◈ SCHOOL SCHEDULE</div>
    <div class="card-body" id="school-body">Press a button to load your schedule.</div>
    <div class="card-btns">
      <button class="card-btn" onclick="loadSchool('today')">Today</button>
      <button class="card-btn" onclick="loadSchool('tomorrow')">Tomorrow</button>
      <button class="card-btn" onclick="loadSchool('week')">This Week</button>
    </div>
  </div>
</div>

<!-- WEATHER -->
<div class="panel" id="tab-weather">
  <div class="card">
    <div class="card-title">◈ WEATHER — LEEUWARDEN</div>
    <div class="card-body" id="weather-body">Loading...</div>
    <div class="card-btns">
      <button class="card-btn" onclick="loadWeather()">⟳ Refresh</button>
    </div>
  </div>
</div>

<!-- MEMORY -->
<div class="panel" id="tab-memory">
  <div class="card">
    <div class="card-title">◈ ARCANE MEMORY</div>
    <div class="card-body" id="memory-body">Loading...</div>
  </div>
  <div class="card">
    <div class="card-title">◈ ADD MEMORY</div>
    <input class="mem-inp" id="mem-inp" type="text" placeholder="Remember that I...">
    <button class="card-btn" onclick="addMemory()">◈ Remember This</button>
  </div>
</div>

<script>
// ── SESSION ─────────────────────────────────────────────────
const SESSION = 'user_' + Math.random().toString(36).slice(2,8);

// ── ORB STATE ───────────────────────────────────────────────
let orbState = 'idle'; // idle | listening | thinking | speaking
let orbAngle = 0, orbPulse = 0, orbPulseDir = 1, orbScan = 0;
let orbColor = {r:0.9,g:0,b:0};
let orbTargetColor = {r:0.9,g:0,b:0};

const STATE_COLORS = {
  idle:      {r:0.9, g:0.0, b:0.0},
  listening: {r:1.0, g:0.0, b:0.0},
  thinking:  {r:0.0, g:0.3, b:1.0},
  speaking:  {r:1.0, g:0.4, b:0.0},
  alert:     {r:1.0, g:0.8, b:0.0},
};

function setOrbState(s){
  orbState = s;
  orbTargetColor = STATE_COLORS[s] || STATE_COLORS.idle;
  const dot = document.getElementById('sdot');
  const txt = document.getElementById('stxt');
  const colors = {idle:'#ff2020',listening:'#ff2020',thinking:'#2080ff',speaking:'#ff8800',alert:'#ffcc00'};
  const labels = {idle:'ONLINE',listening:'LISTENING',thinking:'THINKING',speaking:'SPEAKING',alert:'ALERT'};
  dot.style.background = colors[s]||'#ff2020';
  dot.style.boxShadow  = `0 0 6px ${colors[s]||'#ff2020'}`;
  txt.style.color      = colors[s]||'#ff2020';
  txt.textContent      = labels[s]||'ONLINE';
}

// ── ORB CANVAS ──────────────────────────────────────────────
const canvas = document.getElementById('orb');
const ctx    = canvas.getContext('2d');

function lerpColor(a,b,t){
  return {r:a.r+(b.r-a.r)*t, g:a.g+(b.g-a.g)*t, b:a.b+(b.b-a.b)*t};
}
function toRgb(c,alpha=1){
  return `rgba(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)},${alpha})`;
}

function drawOrb(){
  orbColor = lerpColor(orbColor, orbTargetColor, 0.08);
  const W=150,H=150,cx=75,cy=75,R=62;
  ctx.clearRect(0,0,W,H);

  const c = orbColor;
  const boost = orbPulse*8 + (orbState==='speaking'?8:0);

  // Deep sphere
  const bg=ctx.createRadialGradient(cx-8,cy-8,2,cx,cy,R);
  bg.addColorStop(0, toRgb(c,0.25));
  bg.addColorStop(0.5, toRgb(c,0.12));
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();

  // Outer glow
  for(let i=10;i>0;i--){
    ctx.beginPath(); ctx.arc(cx,cy,R+i*2.5+boost*.3,0,Math.PI*2);
    ctx.strokeStyle=toRgb(c,i*0.012); ctx.lineWidth=2.5; ctx.stroke();
  }

  // Orbital rings (JARVIS style)
  const rings=[
    [0.25,0.95,0.88,200,2,1.0],[0.85,0.30,0.88,170,1,-1.3],
    [0.60,0.75,0.82,150,1,0.7],[0.15,0.98,0.78,110,1,1.4],
  ];
  rings.forEach(([tx,ty,rf,bright,width,speed])=>{
    const rr=R*rf, rx=rr, ry=rr*tx;
    const rot=(orbAngle*speed)*Math.PI/180;
    const pts=[];
    for(let j=0;j<=120;j++){
      const a=j*Math.PI*2/120;
      const ex=rx*Math.cos(a), ey=ry*Math.sin(a);
      const px=ex*Math.cos(rot)-ey*Math.sin(rot);
      const py=ex*Math.sin(rot)+ey*Math.cos(rot);
      const z=ry*Math.sin(a+rot);
      pts.push([cx+px,cy+py*ty,(z/rr+1)*0.5]);
    }
    for(let j=0;j<pts.length-1;j++){
      const [px0,py0,d0]=pts[j],[px1,py1,d1]=pts[j+1];
      const d=(d0+d1)*0.5;
      ctx.beginPath(); ctx.moveTo(px0,py0); ctx.lineTo(px1,py1);
      ctx.strokeStyle=toRgb(c,d*0.85); ctx.lineWidth=width; ctx.lineCap='round'; ctx.stroke();
    }
  });

  // Rim
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle=toRgb(c,0.7); ctx.lineWidth=1.2; ctx.stroke();

  // Core glow
  const cr=R*0.26+orbPulse*9+boost*0.5;
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,cr);
  cg.addColorStop(0,'rgba(255,255,255,1)');
  cg.addColorStop(0.2,toRgb(c,1));
  cg.addColorStop(0.6,toRgb(c,0.6));
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.fill();

  // Label
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 10px Arial';
  ctx.fillStyle=toRgb(c,0.3); ctx.fillText('ARCANE',cx+1,cy+1);
  ctx.fillStyle=toRgb({r:1,g:0.5,b:0.5},0.9); ctx.fillText('ARCANE',cx,cy);

  orbAngle=(orbAngle+2.2)%360; orbScan++;
  orbPulse+=0.08*orbPulseDir;
  if(orbPulse>=1)orbPulseDir=-1; if(orbPulse<=0)orbPulseDir=1;
  requestAnimationFrame(drawOrb);
}
drawOrb();

// ── TABS ────────────────────────────────────────────────────
function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['chat','school','weather','memory'][i]===name);
  });
  document.querySelectorAll('.panel').forEach(p=>{
    p.classList.toggle('active',p.id==='tab-'+name);
  });
  if(name==='weather') loadWeather();
  if(name==='memory')  loadMemory();
}

// ── AUDIO (ElevenLabs) ──────────────────────────────────────
function playAudio(b64){
  try{
    const bytes=atob(b64);
    const buf=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) buf[i]=bytes.charCodeAt(i);
    const blob=new Blob([buf],{type:'audio/mpeg'});
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    setOrbState('speaking');
    audio.onended=()=>{ setOrbState('idle'); URL.revokeObjectURL(url); };
    audio.play().catch(()=>setOrbState('idle'));
  }catch(e){ setOrbState('idle'); }
}

// ── CHAT ────────────────────────────────────────────────────
function addMsg(text,role,tag){
  const msgs=document.getElementById('msgs');
  const wrap=document.createElement('div');
  wrap.className='msg-wrap';
  const lbl=document.createElement('div');
  lbl.className='msg-label'+(role==='user'?' you':'');
  lbl.textContent=role==='user'?'YOU':'◈ ARCANE';
  const bub=document.createElement('div');
  bub.className=`bubble ${tag||role}`;
  if(text.startsWith('__IMG__')){
    const img=document.createElement('img');
    const src=text.slice(7);
    img.src=src.startsWith('data:')?src:'data:image/png;base64,'+src;
    bub.appendChild(img);
  } else { bub.textContent=text; }
  wrap.appendChild(lbl); wrap.appendChild(bub);
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
}

function setCaption(t){ document.getElementById('caption').textContent=t; }

function send(text){
  if(!text.trim()) return;
  document.getElementById('inp').value='';
  addMsg(text,'user');
  setOrbState('thinking');
  // add typing indicator
  const msgs=document.getElementById('msgs');
  const typing=document.createElement('div');
  typing.className='typing'; typing.id='typing'; typing.textContent='◈ Processing...';
  msgs.appendChild(typing); msgs.scrollTop=msgs.scrollHeight;

  fetch('/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:text, session:SESSION})
  }).then(r=>r.json()).then(d=>{
    document.getElementById('typing')?.remove();
    if(d.text) addMsg(d.text,'ai');
    if(d.image_b64) addMsg('__IMG__'+d.image_b64,'ai');
    else if(d.action_result && !d.action_result.startsWith('Remembered'))
      addMsg('⚡ '+d.action_result,'ai','action');
    if(d.audio) playAudio(d.audio);
    else setOrbState('idle');
  }).catch(e=>{
    document.getElementById('typing')?.remove();
    addMsg('Connection error: '+e,'ai','sys');
    setOrbState('idle');
  });
}

function sendMsg(){ send(document.getElementById('inp').value.trim()); }

// ── MICROPHONE ──────────────────────────────────────────────
let recognition=null, micActive=false;
function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    addMsg('Speech recognition not supported. Use Chrome.','ai','sys'); return;
  }
  if(micActive){ recognition?.stop(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.continuous=false; recognition.interimResults=true;
  recognition.lang='nl-NL';
  recognition.onstart=()=>{
    micActive=true;
    document.getElementById('micBtn').classList.add('active');
    setOrbState('listening');
  };
  recognition.onresult=e=>{
    let interim='',final='';
    for(const r of e.results){
      if(r.isFinal) final+=r[0].transcript;
      else interim+=r[0].transcript;
    }
    setCaption(interim||final);
    if(final) send(final);
  };
  recognition.onend=()=>{
    micActive=false;
    document.getElementById('micBtn').classList.remove('active');
    setCaption('');
    setOrbState('idle');
  };
  recognition.start();
}

// ── SCHOOL / WEATHER / MEMORY ────────────────────────────────
function loadSchool(p){
  document.getElementById('school-body').textContent='Loading...';
  fetch('/school?period='+p)
    .then(r=>r.json())
    .then(d=>document.getElementById('school-body').textContent=d.result)
    .catch(e=>document.getElementById('school-body').textContent='Error: '+e);
}
function loadWeather(){
  document.getElementById('weather-body').textContent='Loading...';
  fetch('/weather').then(r=>r.json())
    .then(d=>document.getElementById('weather-body').textContent=d.result)
    .catch(e=>document.getElementById('weather-body').textContent='Error: '+e);
}
function loadMemory(){
  fetch('/memory?session='+SESSION).then(r=>r.json())
    .then(d=>document.getElementById('memory-body').textContent=d.result||'No memories yet.');
}
function addMemory(){
  const v=document.getElementById('mem-inp').value.trim();
  if(!v) return;
  fetch('/remember',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fact:v,session:SESSION})})
    .then(()=>{ document.getElementById('mem-inp').value=''; loadMemory(); });
}

// ── INIT ────────────────────────────────────────────────────
window.onload=()=>{
  addMsg("Systems online. I am ARCANE — your personal AI.\nSpeak or type to begin. I understand English and Dutch.",'ai','sys');
  loadWeather();
};
</script>
</body>
</html>
